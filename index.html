<!DOCTYPE html>
<html>
<head>
    <title>MD Hamim | Ethical Hacker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    padding:0;
    background:black;
    color:#00ffcc;
    font-family:Courier New;
    text-align:center;
    overflow:hidden;
}

canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

.container {
    margin-top:80px;
}

img {
    width:140px;
    height:140px;
    border-radius:50%;
    border:3px solid #00ffcc;
}

h1 {
    font-size:40px;
    margin-top:20px;
}

.typing {
    font-size:20px;
    height:30px;
}

.btn {
    display:inline-block;
    margin:15px;
    padding:10px 25px;
    background:#00ffcc;
    color:black;
    text-decoration:none;
    border-radius:25px;
    font-weight:bold;
}

footer {
    margin-top:40px;
    font-size:14px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<img src="https://i.ibb.co/4pDNDk1/avatar.png">

<h1>MD Hamim</h1>

<div class="typing" id="typing"></div>

<a class="btn" href="https://github.com/mdhamimofficial" target="_blank">GitHub</a>
<a class="btn" href="mailto:your@email.com">Contact Me</a>

</div>

<footer>
© 2026 MD Hamim | Cyber Security Enthusiast
</footer>

<script>
// Typing Effect
const text = ["Aspiring Programmer",
              "Ethical Hacker",
              "Learning Linux & Networking",
              "Future Cyber Security Expert"];
let count = 0;
let index = 0;
let currentText = "";
let letter = "";

(function type(){
    if(count === text.length){
        count = 0;
    }
    currentText = text[count];
    letter = currentText.slice(0, ++index);

    document.getElementById("typing").textContent = letter;
    if(letter.length === currentText.length){
        count++;
        index = 0;
        setTimeout(type,1000);
    } else {
        setTimeout(type,100);
    }
})();

// Matrix Background
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width/fontSize;

const drops = [];

for(let x=0;x<columns;x++)
drops[x]=1;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ffcc";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(draw,33);
</script>

</body>
</html>
