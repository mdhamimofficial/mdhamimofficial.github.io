<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Spin Giveaway</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

h1 {
  margin-top: 20px;
  font-size: 28px;
}

/* Wheel Container */
#wheel-container {
  position: relative;
  width: 350px;
  height: 350px;
  margin: 30px auto;
}

/* Pointer */
#pointer {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 30px;
}

/* Wheel */
#wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 8px solid white;
  background: conic-gradient(
    #ef4444 0deg 60deg,
    #f97316 60deg 120deg,
    #eab308 120deg 180deg,
    #22c55e 180deg 240deg,
    #3b82f6 240deg 300deg,
    #8b5cf6 300deg 360deg
  );
  transition: transform 4s ease-out;
}

/* Center Circle */
#center {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 80px;
  height: 80px;
  background: white;
  color: black;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  line-height: 80px;
  font-weight: bold;
}

/* Button */
button {
  padding: 15px 35px;
  font-size: 18px;
  background: #22c55e;
  color: white;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* Result */
#result {
  margin-top: 20px;
  font-size: 22px;
}
</style>
</head>

<body>

<h1>🎉 Eid Spin Giveaway 🎉</h1>

<div id="wheel-container">
  <div id="pointer">🔻</div>
  <div id="wheel"></div>
  <div id="center">SPIN</div>
</div>

<button onclick="spin()" id="btn">SPIN NOW</button>

<div id="result"></div>

<script>

// 🎯 Budget Control
let rewards = [
  { name: "50৳ 💸", limit: 2 },
  { name: "30৳ 💸", limit: 2 },
  { name: "20৳ 💸", limit: 3 },
  { name: "10৳ 💸", limit: 4 },
  { name: "Better Luck 😅", limit: 999 }
];

// Load saved limits
let saved = JSON.parse(localStorage.getItem("reward_limits"));
if(saved) rewards = saved;

function spin() {

  if(localStorage.getItem("spun")) {
    alert("Already spun!");
    return;
  }

  let available = rewards.filter(r => r.limit > 0);

  let selected;
  let rand = Math.floor(Math.random() * available.length);
  selected = available[rand];
  selected.limit--;

  let index = rewards.findIndex(r => r.name === selected.name);

  let deg = 3600 + (index * 60);

  document.getElementById("wheel").style.transform =
    "rotate(" + deg + "deg)";

  setTimeout(() => {

    document.getElementById("result").innerText =
      "🎉 You got: " + selected.name;

    localStorage.setItem("reward_limits", JSON.stringify(rewards));
    localStorage.setItem("spun", true);
    localStorage.setItem("reward", selected.name);

    document.getElementById("btn").disabled = true;

  }, 4000);
}

// Reload protection
window.onload = function() {
  if(localStorage.getItem("spun")) {
    document.getElementById("btn").disabled = true;
    document.getElementById("result").innerText =
      "✅ Already got: " + localStorage.getItem("reward");
  }
}

</script>

</body>
</html>
