<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MD Hamim</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

.profile img {
  width:150px;
  height:150px;
  border-radius:50%;
  margin-top:40px;
  border:4px solid #38bdf8;
}

#wheel-container {
  width:380px;
  height:380px;
  margin:30px auto;
  position:relative;
}

#wheel {
  width:100%;
  height:100%;
  border-radius:50%;
  border:10px solid white;
  background:conic-gradient(#ef4444,#f97316,#eab308,#22c55e,#3b82f6,#8b5cf6);
  transition:transform 4s ease-out;
}

#pointer {
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  font-size:32px;
}

button {
  padding:14px 35px;
  font-size:18px;
  background:#22c55e;
  border:none;
  border-radius:12px;
  color:white;
}

.msg-btn {
  margin-top:15px;
  padding:12px 25px;
  background:#0084ff;
  border-radius:25px;
}
</style>
</head>

<body>

<div class="profile">
<img src="photo.jpg">
<h1>MD Hamim</h1>
<p>Cyber Security Enthusiast</p>
</div>

<h2>🎉 Eid Giveaway 🎉</h2>

<div id="wheel-container">
<div id="pointer">🔻</div>
<div id="wheel"></div>
</div>

<button onclick="initSound(); spin();" id="spinBtn">SPIN</button>

<div id="result"></div>

<div id="claim" style="display:none;">
<p>📸 Screenshot + Bkash number messenger এ পাঠান</p>
<a href="https://m.me/MdHamim.Real" target="_blank">
<button class="msg-btn">💬 Message Me</button>
</a>
</div>

<script>

// 🎯 FINAL PERFECT SYSTEM
let rewards = [
  {name:"50৳ 💸", limit:1, weight:1},   // jackpot
  {name:"40৳ 💸", limit:2, weight:3},
  {name:"30৳ 💸", limit:3, weight:4},
  {name:"20৳ 💸", limit:4, weight:6},
  {name:"Better Luck 😅", limit:999, weight:3}
];

// load saved
let saved = JSON.parse(localStorage.getItem("limits"));
if(saved) rewards = saved;

let audio;

function initSound(){
  audio = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");
}

function spin(){

  if(localStorage.getItem("spun")){
    alert("❌ Already spun!");
    return;
  }

  let pool = [];

  rewards.forEach(r=>{
    if(r.limit>0){
      for(let i=0;i<r.weight;i++){
        pool.push(r);
      }
    }
  });

  let selected = pool[Math.floor(Math.random()*pool.length)];

  selected.limit--;

  let index = rewards.findIndex(r=>r.name===selected.name);

  let deg = 3600 + Math.random()*360 + index*72;

  document.getElementById("wheel").style.transform =
    "rotate("+deg+"deg)";

  setTimeout(()=>{

    document.getElementById("result").innerText =
      "🎉 You got: "+selected.name;

    document.getElementById("claim").style.display="block";

    if(audio){audio.play();}

    if(!selected.name.includes("Better")){
      confetti({particleCount:120,spread:80});
    }

    localStorage.setItem("spun",true);
    localStorage.setItem("limits",JSON.stringify(rewards));

    document.getElementById("spinBtn").disabled=true;

  },4000);
}

window.onload=function(){
  if(localStorage.getItem("spun")){
    document.getElementById("spinBtn").disabled=true;
  }
}
</script>

</body>
</html>
