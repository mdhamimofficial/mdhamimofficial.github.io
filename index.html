<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eid Spin Giveaway</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #0f172a;
    color: white;
  }

  #wheel {
    margin: 30px auto;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 8px solid white;
    transition: transform 4s ease-out;
  }

  button {
    padding: 15px 30px;
    font-size: 18px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  #result {
    margin-top: 20px;
    font-size: 22px;
  }
</style>
</head>

<body>

<h1>🎉 Eid Spin Giveaway 🎉</h1>

<div id="wheel">🎡</div>

<button id="spinBtn" onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
  const rewards = [
    "Better Luck 😅",
    "10৳ 💸",
    "20৳ 💸",
    "Better Luck 😅",
    "30৳ 💸",
    "Better Luck 😅",
    "40৳ 💸",
    "50৳ 💸"
  ];

  // Unique device ID (simple fingerprint)
  function getDeviceId() {
    let id = localStorage.getItem("device_id");
    if (!id) {
      id = Math.random().toString(36).substring(2) + Date.now();
      localStorage.setItem("device_id", id);
    }
    return id;
  }

  function spin() {

    // Already spun check
    if (localStorage.getItem("has_spun")) {
      alert("❌ You already used your spin!");
      return;
    }

    let index = Math.floor(Math.random() * rewards.length);
    let degree = 3600 + (index * 45);

    document.getElementById("wheel").style.transform =
      "rotate(" + degree + "deg)";

    setTimeout(() => {
      let reward = rewards[index];

      document.getElementById("result").innerText =
        "🎉 You got: " + reward;

      // Save spin permanently
      localStorage.setItem("has_spun", true);
      localStorage.setItem("reward", reward);

      document.getElementById("spinBtn").disabled = true;

    }, 4000);
  }

  // Load previous result if already spun
  window.onload = function () {
    if (localStorage.getItem("has_spun")) {
      document.getElementById("spinBtn").disabled = true;
      document.getElementById("result").innerText =
        "✅ Already got: " + localStorage.getItem("reward");
    }
  };
</script>

</body>
</html>
